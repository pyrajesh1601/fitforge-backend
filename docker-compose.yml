version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: fitforge-postgres

    environment:
      POSTGRES_DB: fitforge
      POSTGRES_USER: rajesh
      POSTGRES_PASSWORD: 1601

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  fitforge:
    build: .
    container_name: fitforge-app

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitforge
      SPRING_DATASOURCE_USERNAME: rajesh
      SPRING_DATASOURCE_PASSWORD: 1601

volumes:
  postgres-data: